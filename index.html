<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 태그 검사기 — 열림/닫힘 태그 오류 체크</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --panel-2: #232735;
    --border: #2d3242;
    --text: #e6e8ef;
    --muted: #9aa0b0;
    --accent: #5b8cff;
    --accent-h: #7aa2ff;
    --ok: #3fb950;
    --err: #f85149;
    --warn: #d29922;
    --mono: ui-monospace, SFMono-Regular, "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    padding: 28px 24px 18px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0 0 6px; font-size: 22px; }
  header p { margin: 0; color: var(--muted); font-size: 14px; }
  main { max-width: 1000px; margin: 0 auto; padding: 24px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  input[type=text] {
    flex: 1; min-width: 240px;
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 11px 13px; border-radius: 8px; font-size: 14px; outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  textarea {
    width: 100%; min-height: 280px; resize: vertical;
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 13px; border-radius: 8px; font-family: var(--mono); font-size: 13px;
    line-height: 1.6; outline: none; tab-size: 2;
  }
  textarea:focus { border-color: var(--accent); }
  button {
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    padding: 11px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
  }
  button:hover { background: var(--accent-h); }
  button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  button.secondary:hover { background: var(--border); }
  label.field { font-size: 13px; color: var(--muted); display: block; margin: 16px 0 6px; }
  .summary {
    margin-top: 20px; padding: 14px 16px; border-radius: 10px; font-weight: 600;
    border: 1px solid var(--border); background: var(--panel);
  }
  .summary.ok { color: var(--ok); border-color: rgba(63,185,80,.4); }
  .summary.err { color: var(--err); border-color: rgba(248,81,73,.4); }
  .issues { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .issue {
    background: var(--panel); border: 1px solid var(--border); border-left: 4px solid var(--err);
    padding: 10px 14px; border-radius: 8px; font-size: 14px;
  }
  .issue.warn { border-left-color: var(--warn); }
  .issue .loc { font-family: var(--mono); color: var(--accent-h); font-size: 12px; }
  .issue .tag { font-family: var(--mono); background: var(--panel-2); padding: 1px 6px; border-radius: 4px; }
  .issue .snippet { display: block; margin-top: 6px; font-family: var(--mono); font-size: 12px; color: var(--muted); white-space: pre-wrap; word-break: break-all; }
  .ctx {
    display: block; margin-top: 8px; background: #0c0e14; border: 1px solid var(--border);
    border-radius: 6px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.65;
  }
  .ctx .ln { display: flex; white-space: pre; }
  .ctx .ln .num {
    flex: 0 0 auto; min-width: 46px; padding: 0 10px 0 8px; text-align: right;
    color: #5a6172; background: #11141d; border-right: 1px solid var(--border); user-select: none;
  }
  .ctx .ln .code { padding: 0 12px; white-space: pre; }
  .ctx .ln.bad { background: rgba(248,81,73,.12); }
  .ctx .ln.bad .num { color: var(--err); font-weight: 700; }
  .ctx .ln.caret .code { color: var(--err); }
  .hint { color: var(--muted); font-size: 13px; margin-top: 8px; }
  .changes { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
  .change {
    font-size: 13px; padding: 7px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--panel); font-family: var(--mono);
  }
  .change.ins { border-left: 4px solid var(--ok); }
  .change.del { border-left: 4px solid var(--err); }
  .change .badge { font-weight: 700; margin-right: 6px; }
  .change.ins .badge { color: var(--ok); }
  .change.del .badge { color: var(--err); }
  .diff {
    margin-top: 14px; background: #0c0e14; border: 1px solid var(--border); border-radius: 8px;
    overflow-x: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.6;
  }
  .diff .dl { display: flex; white-space: pre; padding: 0 10px; }
  .diff .dl .mark { flex: 0 0 auto; width: 16px; color: var(--muted); user-select: none; }
  .diff .dl.add { background: rgba(63,185,80,.14); }
  .diff .dl.add .mark { color: var(--ok); }
  .diff .dl.del { background: rgba(248,81,73,.14); }
  .diff .dl.del .mark { color: var(--err); }
  .diff .dl.same { color: var(--muted); }
  .actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
  .spinner { color: var(--muted); font-size: 14px; margin-top: 16px; }
  a { color: var(--accent-h); }
  .tag-list { font-family: var(--mono); font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>🏷️ HTML 태그 검사기</h1>
  <p>사이트 URL 또는 HTML 코드를 입력하면 열림/닫힘 태그의 짝이 맞는지 검사합니다.</p>
</header>
<main>
  <div class="row">
    <input type="text" id="url" placeholder="https://example.com  (URL을 입력하고 불러오기를 누르세요)">
    <button id="fetchBtn">URL 불러오기</button>
  </div>
  <p class="hint">※ 브라우저 보안(CORS)으로 직접 불러오지 못하면 공개 프록시로 자동 재시도합니다. 그래도 안 되면 페이지 소스를 복사해 아래에 붙여넣으세요.</p>

  <label class="field" for="code">HTML 코드</label>
  <textarea id="code" placeholder="여기에 HTML 코드를 붙여넣으세요..." spellcheck="false"></textarea>

  <div class="row" style="margin-top:14px;">
    <button id="checkBtn">태그 검사하기</button>
    <button id="fixBtn">오류 자동 수정</button>
    <button id="formatBtn" class="secondary">보기 좋게 정리</button>
    <button id="sampleBtn" class="secondary">예제 넣기</button>
    <button id="clearBtn" class="secondary">지우기</button>
  </div>

  <div id="result"></div>
</main>

<script>
// ---- 검사 대상이 아닌(닫힘 태그가 없는) void 요소 ----
const VOID = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
// ---- 내부를 원시 텍스트로 취급하는 요소 (내부의 <태그>를 파싱하지 않음) ----
const RAWTEXT = new Set(['script','style','textarea','title']);
// ---- 선택적으로 닫을 수 있는 요소(닫힘 누락을 오류 대신 경고로 완화) ----
const OPTIONAL_CLOSE = new Set(['li','dt','dd','p','option','thead','tbody','tfoot','tr','td','th','colgroup','head','body','html','optgroup']);

function escapeHtml(s) {
  return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

// 문자열 인덱스 -> 줄/열 번호
function lineColOf(src, idx) {
  let line = 1, col = 1;
  for (let i = 0; i < idx && i < src.length; i++) {
    if (src[i] === '\n') { line++; col = 1; } else { col++; }
  }
  return { line, col };
}

// ---- HTML 을 토큰 배열로 분해 ----
function tokenize(src) {
  const tokens = [];
  let i = 0;
  const n = src.length;
  while (i < n) {
    const lt = src.indexOf('<', i);
    if (lt === -1) {
      if (i < n) tokens.push({ type: 'text', text: src.slice(i) });
      break;
    }
    if (lt > i) tokens.push({ type: 'text', text: src.slice(i, lt) });

    // 주석
    if (src.startsWith('<!--', lt)) {
      const end = src.indexOf('-->', lt + 4);
      const stop = end === -1 ? n : end + 3;
      tokens.push({ type: 'comment', raw: src.slice(lt, stop) });
      i = stop; continue;
    }
    // <!DOCTYPE ...> / <! ... >
    if (src[lt + 1] === '!' || src[lt + 1] === '?') {
      const end = src.indexOf('>', lt);
      const stop = end === -1 ? n : end + 1;
      tokens.push({ type: 'doctype', raw: src.slice(lt, stop) });
      i = stop; continue;
    }

    const isClose = src[lt + 1] === '/';
    const nameStart = lt + (isClose ? 2 : 1);
    const m = /^[a-zA-Z][a-zA-Z0-9:-]*/.exec(src.slice(nameStart));
    if (!m) { tokens.push({ type: 'text', text: '<' }); i = lt + 1; continue; }
    const name = m[0].toLowerCase();

    // '>' 찾기 (따옴표 고려)
    let j = nameStart + m[0].length, quote = null;
    while (j < n) {
      const ch = src[j];
      if (quote) { if (ch === quote) quote = null; }
      else if (ch === '"' || ch === "'") quote = ch;
      else if (ch === '>') break;
      j++;
    }
    if (j >= n) { tokens.push({ type: 'text', text: src.slice(lt) }); break; }

    const raw = src.slice(lt, j + 1);
    const selfClosing = src[j - 1] === '/';

    if (isClose) {
      tokens.push({ type: 'close', name, raw });
      i = j + 1; continue;
    }

    // 원시 텍스트 요소: 내부를 통째로 보존
    if (!selfClosing && RAWTEXT.has(name)) {
      const closeRe = new RegExp('</' + name + '\\b[^>]*>', 'i');
      const rest = src.slice(j + 1);
      const mm = closeRe.exec(rest);
      if (mm) {
        tokens.push({ type: 'raw', name, openRaw: raw, inner: rest.slice(0, mm.index), closeRaw: mm[0] });
        i = j + 1 + mm.index + mm[0].length;
      } else {
        tokens.push({ type: 'raw', name, openRaw: raw, inner: rest, closeRaw: '' });
        i = n;
      }
      continue;
    }

    if (selfClosing) tokens.push({ type: 'self', name, raw });
    else if (VOID.has(name)) tokens.push({ type: 'void', name, raw });
    else tokens.push({ type: 'open', name, raw });
    i = j + 1;
  }
  return tokens;
}

// ---- 토큰을 들여쓰기하여 보기 좋게 재구성 ----
function formatHtml(src) {
  const tokens = tokenize(src);
  const INDENT = '  ';
  const out = [];
  let depth = 0;
  const pad = () => INDENT.repeat(Math.max(0, depth));

  for (let t = 0; t < tokens.length; t++) {
    const tok = tokens[t];

    if (tok.type === 'text') {
      const txt = tok.text.replace(/\s+/g, ' ').trim();
      if (txt) out.push(pad() + txt);
    } else if (tok.type === 'comment' || tok.type === 'doctype' ||
               tok.type === 'void' || tok.type === 'self') {
      out.push(pad() + tok.raw);
    } else if (tok.type === 'raw') {
      out.push(pad() + tok.openRaw);
      const innerLines = tok.inner.replace(/^\s*\n|\n\s*$/g, '').split('\n');
      // 내부 코드의 공통 들여쓰기를 제거한 뒤 한 단계 더 들여씀
      const nonEmpty = innerLines.filter(l => l.trim());
      const minIndent = nonEmpty.length
        ? Math.min(...nonEmpty.map(l => l.match(/^[ \t]*/)[0].length)) : 0;
      for (const l of innerLines) {
        const stripped = l.slice(minIndent).replace(/\s+$/, '');
        out.push(stripped ? INDENT.repeat(depth + 1) + stripped : '');
      }
      if (tok.closeRaw) out.push(pad() + tok.closeRaw);
    } else if (tok.type === 'open') {
      // 자식이 없고 (텍스트만 / 비어있음) 바로 닫히면 한 줄로 유지
      const next = tokens[t + 1], next2 = tokens[t + 2];
      if (next && next.type === 'close' && next.name === tok.name) {
        out.push(pad() + tok.raw + next.raw);
        t += 1;
      } else if (next && next.type === 'text' && next2 &&
                 next2.type === 'close' && next2.name === tok.name) {
        out.push(pad() + tok.raw + next.text.replace(/\s+/g, ' ').trim() + next2.raw);
        t += 2;
      } else {
        out.push(pad() + tok.raw);
        depth++;
      }
    } else if (tok.type === 'close') {
      depth = Math.max(0, depth - 1);
      out.push(pad() + tok.raw);
    }
  }
  return out.join('\n');
}

// ---- 태그 오류 자동 수정 ----
// 닫힘 누락 → 닫힘 태그 삽입 / 잘못된 중첩 → 자동 닫음 / 대응 없는 닫힘 → 제거
function fixHtml(src) {
  const tokens = tokenize(src);
  const stack = [];   // 열린 태그 이름들
  const changes = [];
  let out = '';

  for (const tok of tokens) {
    if (tok.type === 'text') {
      out += tok.text;
    } else if (tok.type === 'comment' || tok.type === 'doctype' ||
               tok.type === 'void' || tok.type === 'self') {
      out += tok.raw;
    } else if (tok.type === 'raw') {
      out += tok.openRaw + tok.inner + tok.closeRaw;
      if (!tok.closeRaw) {
        out += '</' + tok.name + '>';
        changes.push({ action: 'ins', tag: tok.name, reason: '원시 텍스트 요소의 닫힘 태그 누락 → 추가' });
      }
    } else if (tok.type === 'open') {
      out += tok.raw;
      stack.push(tok.name);
    } else if (tok.type === 'close') {
      let found = -1;
      for (let k = stack.length - 1; k >= 0; k--) {
        if (stack[k] === tok.name) { found = k; break; }
      }
      if (found === -1) {
        // 대응하는 여는 태그가 없음 → 닫힘 태그 제거
        changes.push({ action: 'del', tag: tok.name, reason: '대응하는 여는 태그가 없어 제거' });
      } else {
        // found 위에 열린 태그들을 먼저 닫음
        for (let k = stack.length - 1; k > found; k--) {
          out += '</' + stack[k] + '>';
          changes.push({ action: 'ins', tag: stack[k], reason: '닫히지 않은 채 다른 태그가 닫혀 자동으로 닫음' });
        }
        out += tok.raw;
        stack.length = found;
      }
    }
  }

  // 문서 끝까지 닫히지 않은 태그들 닫음
  for (let k = stack.length - 1; k >= 0; k--) {
    out += '</' + stack[k] + '>';
    changes.push({ action: 'ins', tag: stack[k], reason: '문서 끝에서 닫히지 않아 자동으로 닫음' });
  }

  return { fixed: out, changes };
}

// ---- 줄 단위 LCS diff ----
function diffLines(a, b) {
  const n = a.length, m = b.length;
  const dp = Array.from({ length: n + 1 }, () => new Int32Array(m + 1));
  for (let i = n - 1; i >= 0; i--)
    for (let j = m - 1; j >= 0; j--)
      dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
  const res = [];
  let i = 0, j = 0;
  while (i < n && j < m) {
    if (a[i] === b[j]) { res.push({ type: 'same', text: a[i] }); i++; j++; }
    else if (dp[i + 1][j] >= dp[i][j + 1]) { res.push({ type: 'del', text: a[i] }); i++; }
    else { res.push({ type: 'add', text: b[j] }); j++; }
  }
  while (i < n) { res.push({ type: 'del', text: a[i++] }); }
  while (j < m) { res.push({ type: 'add', text: b[j++] }); }
  return res;
}

function checkHtml(src) {
  const issues = [];
  const stack = [];        // { name, index } 열려 있는 태그들
  let i = 0;
  const n = src.length;

  while (i < n) {
    const lt = src.indexOf('<', i);
    if (lt === -1) break;

    // 주석 / 조건부 주석
    if (src.startsWith('<!--', lt)) {
      const end = src.indexOf('-->', lt + 4);
      i = end === -1 ? n : end + 3;
      continue;
    }
    // <!DOCTYPE ...> 또는 <!...>
    if (src[lt + 1] === '!') {
      const end = src.indexOf('>', lt);
      i = end === -1 ? n : end + 1;
      continue;
    }
    // <?xml ... ?> 처리 명령
    if (src[lt + 1] === '?') {
      const end = src.indexOf('>', lt);
      i = end === -1 ? n : end + 1;
      continue;
    }

    // 태그 이름 시작인지 확인
    const isClose = src[lt + 1] === '/';
    const nameStart = lt + (isClose ? 2 : 1);
    const m = /^[a-zA-Z][a-zA-Z0-9:-]*/.exec(src.slice(nameStart));
    if (!m) { i = lt + 1; continue; } // '<' 가 태그가 아님 (예: a < b)

    const name = m[0].toLowerCase();

    // 태그 끝 '>' 찾기 (따옴표 속성값 안의 '>' 고려)
    let j = nameStart + m[0].length;
    let quote = null;
    while (j < n) {
      const ch = src[j];
      if (quote) { if (ch === quote) quote = null; }
      else if (ch === '"' || ch === "'") quote = ch;
      else if (ch === '>') break;
      j++;
    }
    if (j >= n) {
      issues.push(mkIssue('error', name, lt, src, `'<${isClose ? '/' : ''}${name}' 태그의 닫는 '>' 를 찾지 못했습니다.`));
      break;
    }

    const selfClosing = src[j - 1] === '/';
    const after = j + 1;

    if (isClose) {
      // ----- 닫힘 태그 처리 -----
      // 스택에서 일치하는 열림 태그 탐색
      let found = -1;
      for (let k = stack.length - 1; k >= 0; k--) {
        if (stack[k].name === name) { found = k; break; }
      }
      if (found === -1) {
        issues.push(mkIssue('error', name, lt, src,
          `닫힘 태그 </${name}> 에 대응하는 열림 태그가 없습니다.`));
      } else {
        // found 위에 쌓인(닫히지 않은) 태그들 보고
        for (let k = stack.length - 1; k > found; k--) {
          const t = stack[k];
          const level = OPTIONAL_CLOSE.has(t.name) ? 'warn' : 'error';
          issues.push(mkIssue(level, t.name, t.index, src,
            `<${t.name}> 가 닫히지 않은 채 </${name}> 를 만났습니다 (닫힘 태그 누락 또는 순서 오류).`));
        }
        stack.length = found; // found 포함 그 위로 모두 제거
      }
      i = after;
      continue;
    }

    // ----- 열림 태그 처리 -----
    if (!selfClosing && !VOID.has(name)) {
      stack.push({ name, index: lt });
    }

    i = after;

    // 원시 텍스트 요소: 대응하는 닫힘까지 건너뜀
    if (!selfClosing && RAWTEXT.has(name)) {
      const closeRe = new RegExp('</' + name + '\\b', 'i');
      const rest = src.slice(after);
      const mm = closeRe.exec(rest);
      if (mm) {
        // 닫힘 태그 위치로 이동 → 다음 루프에서 정상 처리되도록 stack 유지
        i = after + mm.index;
      } else {
        issues.push(mkIssue('error', name, lt, src, `<${name}> 의 닫힘 태그 </${name}> 를 찾지 못했습니다.`));
        stack.pop();
        i = n;
      }
    }
  }

  // 끝까지 닫히지 않은 태그들
  for (let k = stack.length - 1; k >= 0; k--) {
    const t = stack[k];
    const level = OPTIONAL_CLOSE.has(t.name) ? 'warn' : 'error';
    issues.push(mkIssue(level, t.name, t.index, src,
      `<${t.name}> 가 끝까지 닫히지 않았습니다 (</${t.name}> 누락).`));
  }

  return issues;
}

function mkIssue(level, name, index, src, message) {
  const { line, col } = lineColOf(src, index);
  return { level, name, line, col, index, message };
}

// 오류 줄 주변(앞뒤 CONTEXT줄)을 줄번호와 함께 HTML로 만들기
const CONTEXT = 3;
function buildContext(src, badLine, badCol) {
  const lines = src.split('\n');
  const start = Math.max(1, badLine - CONTEXT);
  const end = Math.min(lines.length, badLine + CONTEXT);
  let out = '<div class="ctx">';
  for (let ln = start; ln <= end; ln++) {
    const text = lines[ln - 1] || '';
    const isBad = ln === badLine;
    out += `<div class="ln${isBad ? ' bad' : ''}">` +
      `<span class="num">${ln}</span>` +
      `<span class="code">${escapeHtml(text) || ' '}</span></div>`;
    if (isBad) {
      // 오류 열 위치를 가리키는 캐럿 줄
      const pad = ' '.repeat(Math.max(0, badCol - 1));
      out += `<div class="ln caret">` +
        `<span class="num"></span>` +
        `<span class="code">${pad}^</span></div>`;
    }
  }
  out += '</div>';
  return out;
}

function render(issues, meta, src) {
  const result = document.getElementById('result');
  const errors = issues.filter(x => x.level === 'error');
  const warns = issues.filter(x => x.level === 'warn');

  let html = '';
  if (issues.length === 0) {
    html += `<div class="summary ok">✅ 태그 오류를 찾지 못했습니다. ${meta || ''}</div>`;
  } else {
    const cls = errors.length ? 'err' : 'ok';
    html += `<div class="summary ${cls}">` +
      `🔎 오류 ${errors.length}건` + (warns.length ? `, 경고 ${warns.length}건` : '') +
      ` 발견 ${meta || ''}</div>`;
  }

  if (issues.length) {
    // 줄 번호 순 정렬
    issues.sort((a, b) => a.line - b.line || a.col - b.col);
    html += '<div class="issues">';
    for (const it of issues) {
      html += `<div class="issue ${it.level === 'warn' ? 'warn' : ''}">` +
        `<span class="loc">${it.line}행 ${it.col}열</span> · ` +
        `<span class="tag">&lt;${escapeHtml(it.name)}&gt;</span> ${escapeHtml(it.message)}` +
        (src != null ? buildContext(src, it.line, it.col) : '') + `</div>`;
    }
    html += '</div>';
  }
  result.innerHTML = html;
}

// ---- URL 불러오기 (CORS 프록시 폴백 포함) ----
async function fetchUrl(url) {
  const result = document.getElementById('result');
  result.innerHTML = '<div class="spinner">⏳ 불러오는 중...</div>';
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  const attempts = [
    url,
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    'https://corsproxy.io/?url=' + encodeURIComponent(url),
  ];
  for (let a = 0; a < attempts.length; a++) {
    try {
      const res = await fetch(attempts[a], { redirect: 'follow' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if (text && text.trim()) {
        document.getElementById('code').value = text;
        return text;
      }
    } catch (e) { /* 다음 방법 시도 */ }
  }
  result.innerHTML = '<div class="summary err">❌ URL을 불러오지 못했습니다. 페이지 소스를 직접 복사해 붙여넣어 주세요.</div>';
  return null;
}

let pendingFix = null; // 적용 대기 중인 수정본(포맷된 문자열)

function renderFix(original) {
  const result = document.getElementById('result');
  const { fixed, changes } = fixHtml(original);
  const fmtOrig = formatHtml(original);
  const fmtFixed = formatHtml(fixed);
  pendingFix = fmtFixed;

  let html = '';
  if (changes.length === 0) {
    html += `<div class="summary ok">✅ 수정할 태그 오류가 없습니다.</div>`;
    result.innerHTML = html;
    return;
  }

  const ins = changes.filter(c => c.action === 'ins').length;
  const del = changes.filter(c => c.action === 'del').length;
  html += `<div class="summary err">🔧 ${changes.length}곳 수정` +
    ` (태그 추가 ${ins}건, 제거 ${del}건). 아래에서 변경 내용을 확인하고 적용하세요.</div>`;

  // 변경 항목 목록
  html += '<div class="changes">';
  for (const c of changes) {
    const label = c.action === 'ins' ? '추가' : '제거';
    const code = c.action === 'ins' ? `</${c.name || c.tag}>` : `</${c.tag}>`;
    html += `<div class="change ${c.action}">` +
      `<span class="badge">${c.action === 'ins' ? '＋' : '－'} ${label}</span>` +
      `<span class="tag">${escapeHtml('</' + c.tag + '>')}</span> · ${escapeHtml(c.reason)}</div>`;
  }
  html += '</div>';

  // 원본 vs 수정본 diff
  const diff = diffLines(fmtOrig.split('\n'), fmtFixed.split('\n'));
  html += '<div class="diff">';
  for (const d of diff) {
    const cls = d.type === 'add' ? 'add' : d.type === 'del' ? 'del' : 'same';
    const mark = d.type === 'add' ? '+' : d.type === 'del' ? '-' : ' ';
    html += `<div class="dl ${cls}"><span class="mark">${mark}</span>` +
      `<span>${escapeHtml(d.text) || ' '}</span></div>`;
  }
  html += '</div>';

  html += '<div class="actions">' +
    '<button id="applyFixBtn">수정본 적용</button>' +
    '<button id="cancelFixBtn" class="secondary">취소</button>' +
    '</div>';

  result.innerHTML = html;
  document.getElementById('applyFixBtn').addEventListener('click', () => {
    if (pendingFix != null) {
      document.getElementById('code').value = pendingFix;
      render(checkHtml(pendingFix), `(수정본 적용 완료 · ${pendingFix.split('\n').length}행).`, pendingFix);
    }
  });
  document.getElementById('cancelFixBtn').addEventListener('click', () => {
    result.innerHTML = '';
  });
}

document.getElementById('fixBtn').addEventListener('click', () => {
  const code = document.getElementById('code').value;
  if (!code.trim()) { render([], '— 입력된 HTML이 없습니다.'); return; }
  renderFix(code);
});
